<!doctype html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<meta name="color-scheme" content="only light">
<title>Owl preview — Jan's Tree Game</title>
<style>
  :root{color-scheme:only light}
  body{margin:0;background:#FBF6E2;color:#5a4a2a;font-family:Georgia,'Times New Roman',serif;text-align:center;padding:18px 14px 60px}
  h1{font-size:21px;font-weight:600;margin:6px 0 2px}
  h2{font-size:15px;font-weight:600;margin:34px 0 10px;color:#7a5a2e}
  p.note{font-size:13px;color:#8a7a55;max-width:340px;margin:4px auto 8px;line-height:1.5}
  .row{display:flex;gap:30px;align-items:center;justify-content:center;flex-wrap:wrap}
  .wag-band{background:#241a12;border-radius:18px;padding:22px 14px 26px;margin:18px auto 0;max-width:380px}
  .wag-band h2{color:#e8c24a}
  /* ---- owl ---- */
  .share-wrap{--so-body:#9a5a30;--so-wing:#7c451f;--so-face:#ecd29a;--so-beak:#b8893f;position:relative;display:inline-block}
  .share-wrap.wag{--so-body:#E8C24A;--so-wing:#8A6A1E;--so-face:#FFF3D6;--so-beak:#C8881F}
  .so-body{fill:var(--so-body)}.so-wing{fill:var(--so-wing)}.so-face{fill:var(--so-face)}.so-beak{fill:var(--so-beak)}.so-streak{stroke:var(--so-streak,var(--so-wing))}
  .so-seal{color-scheme:light;position:relative;overflow:hidden;border-radius:50%;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 38% 32%,#8FC0E8,#3D72A8 60%,#285685);box-shadow:0 5px 16px rgba(20,50,90,.45), inset 0 2px 6px rgba(255,255,255,.55), inset 0 -9px 16px rgba(15,45,85,.4)}
  .wag .so-seal{background:radial-gradient(circle at 38% 32%,#7d5c26,#4f3a16 62%,#2c2010);box-shadow:0 5px 16px rgba(0,0,0,.5), inset 0 2px 6px rgba(255,226,150,.4), inset 0 -9px 16px rgba(0,0,0,.45)}
  .so-seal::after{content:'';position:absolute;border-radius:50%;border:2px dashed rgba(232,244,255,.6);z-index:4;pointer-events:none}
  .wag .so-seal::after{border-color:rgba(255,222,140,.55)}
  .big{width:200px;height:200px}.big::after{inset:13px}
  .big .so-owl{height:178px;width:auto}
  .badge{width:52px;height:52px}.badge::after{inset:3px;border-width:1px}
  .badge .so-owl{height:50px;width:auto}
  .badge .so-streak,.badge .so-tuft{display:none}
  .badge .so-wingR g[stroke],.badge .so-wingL g[stroke],.badge .so-wingR path[stroke],.badge .so-wingL path[stroke]{display:none}
  .badge .so-rim{stroke-width:1.6;opacity:.62}
  .badge{--so-beak:#a06a28}
  .so-owl{display:block;transform-origin:50% 80%}
  .so-sheen{position:absolute;top:0;bottom:0;left:0;width:62%;pointer-events:none;z-index:3;background:linear-gradient(100deg,transparent 40%,rgba(255,255,255,.4) 50%,transparent 60%);animation:soSheen 7s ease-in-out infinite}
  @keyframes soSheen{0%,68%{transform:translateX(-160%) skewX(-18deg)}100%{transform:translateX(320%) skewX(-18deg)}}
  /* share button mock */
  .share-btn{display:inline-flex;align-items:center;gap:12px;border:none;cursor:default;
    font-family:Georgia,serif;font-size:16px;color:#fff;background:linear-gradient(#5a8f4e,#447a3a);
    padding:8px 10px 8px 22px;border-radius:34px;box-shadow:0 4px 12px rgba(40,80,40,.35)}
  .wag .share-btn{background:linear-gradient(#8a6a1e,#5f4715)}
  /* animations */
  .so-owl{transform-origin:50% 86%;animation:soBob 3.7s ease-in-out infinite}
  @keyframes soBob{0%,100%{transform:translateY(0) scaleY(1) rotate(0deg)}50%{transform:translateY(-2.4px) scaleY(1.03) rotate(-1deg)}}
  .so-head{transform-box:fill-box;transform-origin:50% 74%;animation:soHeadTurn 12s ease-in-out infinite}
  @keyframes soHeadTurn{0%,46%{transform:translateX(0) scaleX(1) skewY(0deg) rotate(0deg)}53%{transform:translateX(-1px) scaleX(.97) rotate(-2deg)}61%,70%{transform:translateX(-3.4px) scaleX(.9) skewY(-2deg) rotate(-6deg)}78%{transform:translateX(.5px) scaleX(1) rotate(1deg)}84%,100%{transform:translateX(0) scaleX(1) skewY(0deg) rotate(0deg)}}
  .so-eyes{transform-box:fill-box;transform-origin:50% 50%;animation:soGaze 12s ease-in-out infinite}
  @keyframes soGaze{0%,46%{transform:translateX(0) scaleX(1)}53%{transform:translateX(-1.6px)}61%,70%{transform:translateX(-3.1px) scaleX(.93)}78%{transform:translateX(.4px)}84%,100%{transform:translateX(0) scaleX(1)}}
  .so-glint{transform-box:fill-box;transform-origin:50% 50%;animation:soGlint 12s ease-in-out infinite}
  @keyframes soGlint{0%,46%{transform:translateX(0)}53%{transform:translateX(-.5px)}61%,70%{transform:translateX(-1px)}78%{transform:translateX(.1px)}84%,100%{transform:translateX(0)}}
  .so-crown{transform-box:fill-box;transform-origin:50% 100%;animation:soCowlick 3.9s ease-in-out infinite}
  @keyframes soCowlick{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-9deg) translateX(-.4px)}}
  .so-seal .so-wingR{transform-box:fill-box;transform-origin:97% 2%;animation:soWave 3.1s ease-in-out infinite}
  @keyframes soWave{0%{transform:rotate(0deg) scale(1)}10%{transform:rotate(-4deg) scale(1)}30%{transform:rotate(30deg) scale(1.05,1.1)}45%{transform:rotate(21deg) scale(1.03,1.06)}62%{transform:rotate(32deg) scale(1.06,1.12)}78%{transform:rotate(23deg) scale(1.03,1.06)}92%{transform:rotate(29deg) scale(1.05,1.1)}97%{transform:rotate(7deg) scale(1)}100%{transform:rotate(0deg) scale(1)}}
  .so-wingL{transform-box:fill-box;transform-origin:3% 2%;animation:soFlutterL 4.3s ease-in-out infinite}
  @keyframes soFlutterL{0%,100%{transform:rotate(0deg)}50%{transform:rotate(2deg)}}
  .so-lid{transform-box:fill-box;transform-origin:center top;transform:scaleY(0)}
  .so-lid.both{animation:soBlink 10s ease-in-out infinite}
  .so-lid.left{animation:soWink 13s ease-in-out infinite}
  @keyframes soBlink{0%,12%{transform:scaleY(0)}14%{transform:scaleY(1)}19%{transform:scaleY(0)}100%{transform:scaleY(0)}}
  @keyframes soWink{0%,30%{transform:scaleY(0)}33%{transform:scaleY(1)}40%{transform:scaleY(1)}44%{transform:scaleY(0)}100%{transform:scaleY(0)}}
  @media (prefers-reduced-motion:reduce){.so-owl,.so-head,.so-eyes,.so-glint,.so-crown,.so-wingR,.so-wingL,.so-lid,.so-sheen{animation:none!important}}
</style></head><body>
  <h1>Let's Identify Trees! — the Share owl</h1>
  <p class="note">A cute tawny owlet who waves goodbye from the Share button. Give it a few seconds — it breathes, blinks, winks, waves its wing, and turns its head to peek.</p>
  <div class="row"><span class="share-wrap"><span class="so-seal big"><span class="so-sheen"></span></span></span></div>

  <h2>On the Share button (real size)</h2>
  <div class="row"><span class="share-wrap"><button class="share-btn">Share me with a friend<span class="so-seal badge"><span class="so-sheen"></span></span></button></span></div>

  <h2>Just the badge, actual ~52px</h2>
  <div class="row"><span class="share-wrap"><span class="so-seal badge"><span class="so-sheen"></span></span></span></div>

  <div class="wag-band">
    <h2>Wagner mode (gold)</h2>
    <div class="row"><span class="share-wrap wag"><span class="so-seal big"><span class="so-sheen"></span></span></span></div>
    <div class="row" style="margin-top:14px"><span class="share-wrap wag"><button class="share-btn">Share me with a friend<span class="so-seal badge"><span class="so-sheen"></span></span></button></span></div>
  </div>
